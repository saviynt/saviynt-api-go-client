  /addrole:
    post:
      description: |-
        This API adds role to user.
        The `Authorization` must have `Bearer` followed by `Token`.
        Mandatory params:
        `username`,
        `rolename`
      operationId: addRole
      requestBody:
        content:
          application/json:
            examples:
              Add Role:
                value:
                  rolename: Fire Fighter
                  username: johndoe
            schema:
              $ref: '#/components/schemas/addRole_request'
      responses:
        "200":
          content:
            application/json:
              examples:
                Add Role:
                  value:
                    message: " Tasks created. IDs:: 673975 "
              schema:
                $ref: '#/components/schemas/addRole_200_response'
          description: Add Role
          headers:
            Date:
              explode: false
              schema:
                example: "Wed, 24 Oct 2018 21:17:09 GMT"
                type: string
              style: simple
            Server:
