      responses:
        "200":
          content:
            application/json:
              examples:
                Delete UserGroup:
                  value:
                    errorCode: "0"
                    msg: Success
              schema:
                $ref: '#/components/schemas/deleteUsergroup_200_response'
          description: Delete UserGroup
          headers:
            Date:
              explode: false
              schema:
                example: "Sat, 29 Dec 2018 01:43:15 GMT"
                type: string
              style: simple
            Server:
              explode: false
              schema:
                example: Apache-Coyote/1.1
                type: string
              style: simple
            Set-Cookie:
              explode: false
              schema:
                example: CCSRF-TOKEN=4df14cd0-0217-4b9e-8908-99c221e39ede; Path=/
                type: string
              style: simple
            X-Content-Type-Options:
              explode: false
              schema:
                example: nosniff
                type: string
              style: simple
      summary: Delete UserGroup
      tags:
      - groups
