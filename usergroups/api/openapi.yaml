openapi: 3.1.0
info:
  description: API for managing user groups in Saviynt.
  title: Saviynt API
  version: 1.0.0
servers:
- description: Sample server
  url: "https://api.example.com"
paths:
  /createUpdateUserGroup:
    post:
      description: "This API create or update usergroup in SSM.\nThe `Authorization`\
        \ must have `Bearer` followed by `Token`.\nMandatory params:\n`usergroup`,\n\
        `username`\nOptional params:\n`user_groupdescription`,\n`users` - \n1. `username`\
        \ (mandatory),\n2. `updateType` - ADD/REMOVE (optional),\n`entitlements` -\
        \ \n1. `endpoint` (mandatory),\n2. `entitlement_type` (mandatory),\n3. `entitlement_value`\
        \ (mandatory),\n4. `updateType` ADD/REMOVE (optional),\n`owners` -\n1. `username`\
        \ (mandatory),\n2. `updateType` - ADD/REMOVE/SETRANK (optional),\n3. `rank`\
        \ (optional)"
      operationId: createUpdateUsergroup
      requestBody:
        content:
          application/json:
            examples:
              Create/Update UserGroup:
                value:
                  entitlements:
                  - endpoint: Oracle
                    entitlement_type: OEBS-Responsibility
                    entitlement_value: FIXED_ASSET_INQUIRY_TECH_IN
                    updateType: ADD
                  - endpoint: Oracle
                    entitlement_type: OEBS-Responsibility
                    entitlement_value: FIXED_ASSET_INQUIRY_SOFT_IN
                    updateType: REMOVE
                  owners:
                  - rank: "2"
                    updateType: ADD
                    username: G000706
                  - updateType: REMOVE
                    username: G000526
                  - rank: "2"
                    updateType: SETRANK
                    username: U009075
                  user_groupdescription: ADOwnerGroupdesc
                  usergroup: ADOwnerGroup
                  username: admin
                  users:
                  - updateType: ADD
                    username: U003961
                  - updateType: REMOVE
                    username: M0014
            schema:
              $ref: '#/components/schemas/createUpdateUsergroup_request'
      responses:
        "200":
          content:
            application/json:
              examples:
                Create/Update UserGroup:
                  value:
                    errorCode: "1"
                    msg: ' user U003961 already present in usergroup. user M0014 does
                      not exist in usergroup. entitlement FIXED_ASSET_INQUIRY_TECH_IN
                      already present in usergroup. entitlement FIXED_ASSET_INQUIRY_SOFT_IN
                      does not exist in usergroup. owner G000706 is already present.
                      Owner U009075 does not exist in usergroup. owner G000526 is
                      not present.'
                    usergroupkey: "2"
              schema:
                $ref: '#/components/schemas/createUpdateUsergroup_200_response'
          description: Create/Update UserGroup
          headers:
            Access-Control-Allow-Credentials:
              explode: false
              schema:
                example: "true"
                type: string
              style: simple
            Access-Control-Allow-Origin:
              explode: false
              schema:
                example: http://localhost
                type: string
              style: simple
            Cache-Control:
              explode: false
              schema:
                example: "post-check=0, pre-check=0"
                type: string
              style: simple
            Date:
              explode: false
              schema:
                example: "Tue, 22 Jun 2021 18:33:36 GMT"
                type: string
              style: simple
            Expires:
              explode: false
              schema:
                example: "Sun, 7 May 1995 12:00:00 GMT"
                type: string
              style: simple
            Referrer-Policy:
              explode: false
              schema:
                example: same-origin
                type: string
              style: simple
            Server:
              explode: false
              schema:
                example: Apache-Coyote/1.1
                type: string
              style: simple
            Set-Cookie:
              explode: false
              schema:
                example: CCSRF-TOKEN=1eae9a2d-290d-44de-bcf9-3d74760832f7; Path=/
                type: string
              style: simple
            Strict-Transport-Security:
              explode: false
              schema:
                example: max-age=31536000; includeSubdomains
                type: string
              style: simple
            X-Content-Type-Options:
              explode: false
              schema:
                example: nosniff
                type: string
              style: simple
            X-Frame-Options:
              explode: false
              schema:
                example: DENY
                type: string
              style: simple
      summary: Create/Update UserGroup
      tags:
      - groups
  /addRemoveUserFromUserGroup:
    post:
      description: "This API is used to add or remove user from a usergroup in SSM\r\
        \n\r\nThe `Authorization` must have `Bearer` followed by `Token`.\r\n\r\n\
        Mandatory params: \r\n\r\n`username` - User which needs to be added/ removed,\r\
        \n\r\n`user_groupname` - Group name to be added/removed,\r\n\t\r\n`actionType`\
        \ (0/1) - 0:Add and 1:Remove"
      operationId: addRemoveUserFromUsergroup
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/addRemoveUserFromUsergroup_request'
      responses:
        "200":
          content:
            application/json:
              examples:
                Add/Remove User From UserGroup:
                  value:
                    errorCode: "0"
                    message: saved successfully
              schema:
                $ref: '#/components/schemas/addRemoveUserFromUsergroup_200_response'
          description: Add/Remove User From UserGroup
          headers:
            Date:
              explode: false
              schema:
                example: "Tue, 11 Sep 2018 01:24:07 GMT"
                type: string
              style: simple
            Server:
              explode: false
              schema:
                example: Apache-Coyote/1.1
                type: string
              style: simple
            Set-Cookie:
              explode: false
              schema:
                example: CCSRF-TOKEN=a3914d7a-7ab2-4354-9de2-4fb0258322f9; Path=/
                type: string
              style: simple
      summary: Add/Remove User From UserGroup
      tags:
      - groups
  /deleteUserGroup:
    post:
      description: |-
        This API delete usergroup in SSM.
        The `Authorization` must have `Bearer` followed by `Token`.
        Mandatory params:
        `username`,
        `usergroup`
      operationId: deleteUsergroup
      requestBody:
        content:
          application/json:
            examples:
              Delete UserGroup:
                value:
                  usergroup: testApi2
                  username: smarquez
            schema:
