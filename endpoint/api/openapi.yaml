    createEndpoint_request:
      properties:
        endpointname:
          description: The name of the endpoint to be created.
          example: Create-an-endpoint
          type: string
        displayName:
          description: The display name for the endpoint.
          example: new-endpoint
          type: string
        securitysystem:
          description: The security system to which the endpoint will belong.
          example: connectiontest
          type: string
        description:
          description: Description of the endpoint.
          example: Create endpoint from API
          type: string
        ownerType:
          description: "Type of owner (e.g., User, Usergroup)."
          example: User
          type: string
        owner:
          description: Owner of the endpoint.
          example: admin
          type: string
        resourceOwnerType:
          description: "Type of resource owner (e.g., Usergroup)."
          example: Usergroup
          type: string
        resourceOwner:
          description: Resource owner for the endpoint
          type: string
        accessquery:
          description: Access query for the endpoint.
          example: access qry
          type: string
        enableCopyAccess:
          description: Whether to enable copy access.
          example: "false"
          type: string
        disableNewAccountRequestIfAccountExists:
          description: Whether to disable new account requests if an account already
            exists.
          example: "false"
          type: string
        disableRemoveAccount:
          description: Whether to disable account removal.
          example: "false"
          type: string
        disableModifyAccount:
          description: Whether to disable account modifications.
          example: "true"
          type: string
        userAccountCorrelationRule:
          description: Rule to map users in EIC with the accounts during account import
          example: (users.customproperty7) = accounts.name
          type: string
        createEntTaskforRemoveAcc:
          description: "If this is set to true, remove Access tasks will be created\
            \ for entitlements (account entitlements and their dependent entitlements)\
            \ when a user requests for removing an account"
          type: string
        outofbandaction:
          description: Use this parameter to determine if you need to remove the accesses
            which were granted outside Saviynt
          type: string
        connectionconfig:
          description: Connection Configuration is related to processing the add access
            tasks and remove access tasks related to AD and LDAP Connectors.
          type: string
        requestable:
          description: Is this endpoint requestable
          type: string
        parentAccountPattern:
          description: Specify the parent and child relationship for the Active Directory
            endpoint
          type: string
        serviceAccountNameRule:
          description: Rule to generate a name for this endpoint while creating a
            new service account
          type: string
        serviceAccountAccessQuery: {}
        blockInflightRequest:
          description: To allow if users can raise duplicate requests for the same
            applications
          example: "true"
          type: string
        accountNameRule:
          description: Rule to generate an account name for this endpoint while creating
            a new account
          type: string
        allowChangePassword_sqlquery:
          description: SQL query to configure the accounts for which you can change
            passwords
          type: string
        accountNameValidatorRegex:
          description: specify the regular expression which will be used to validate
            the account name either generated by the rule or provided manually
          type: string
        statusConfig:
          description: "Enable the State and Status options (Enable, Disable, Lock,\
            \ Unlock) that would be available to request for a user and service accounts."
          type: string
        pluginConfigs:
          description: 'The Plugin Configuration drives the functionality of the Saviynt
            SmartAssist (Browserplugin). '
          type: string
        endpointConfig:
          description: Option to copy data in Step 3 of the service account request
            will be enabled
          type: string
